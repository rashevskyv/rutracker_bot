name: Bot Runner

on:
  schedule:
    # Run main bot every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Create config directory and settings.json
        run: |
          mkdir -p config
          echo "$SETTINGS_JSON" > config/settings.json
        env:
          SETTINGS_JSON: ${{ secrets.SETTINGS_JSON }}
          
      - name: Download state from Gist
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: python sync_gist_state.py download
        
      - name: Run Main Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python main.py

      - name: Run Collect Homebrew Updates (if time matches)
        run: |
          # Run homebrew collector only between 07:00 and 07:15 UTC
          CURRENT_HOUR=$(date -u +%H)
          CURRENT_MIN=$(date -u +%M)
          if [ "$CURRENT_HOUR" = "07" ] && [ "$CURRENT_MIN" -lt "15" ]; then
            echo "Time is 07:00 UTC, running homebrew collector..."
            python collect_homebrew_updates.py
          else
            echo "Skipping homebrew collector (not 07:00 UTC)"
          fi
          
      - name: Run Send Daily Digest (if time matches)
        run: |
          # Run digests only between 08:00 and 08:15 UTC
          CURRENT_HOUR=$(date -u +%H)
          CURRENT_MIN=$(date -u +%M)
          if [ "$CURRENT_HOUR" = "08" ] && [ "$CURRENT_MIN" -lt "15" ]; then
            echo "Time is 08:00 UTC, running daily digest..."
            python send_daily_digest.py
          else
            echo "Skipping daily digest (not 08:00 UTC)"
          fi

      - name: Run Send Homebrew Digest (if time matches)
        run: |
          # Run digests only between 08:00 and 08:15 UTC
          CURRENT_HOUR=$(date -u +%H)
          CURRENT_MIN=$(date -u +%M)
          if [ "$CURRENT_HOUR" = "08" ] && [ "$CURRENT_MIN" -lt "15" ]; then
            echo "Time is 08:00 UTC, running homebrew digest..."
            python send_homebrew_digest.py
          else
            echo "Skipping homebrew digest (not 08:00 UTC)"
          fi
          
      - name: Upload state to Gist
        if: always() # Ensure state is saved even if bot fails
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: python sync_gist_state.py upload
