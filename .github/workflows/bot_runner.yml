name: Bot Runner

on:
  schedule:
    # Run main bot every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      force_task:
        description: 'Force run a specific task'
        required: false
        type: choice
        options:
          - none
          - run_daily_digest
          - run_homebrew_digest
          - run_collect_homebrew
          - run_swuk_digest
          - run_collect_swuk
        default: 'none'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Create config directory and settings.json
        run: |
          mkdir -p config
          echo "$SETTINGS_JSON" > config/settings.json
        env:
          SETTINGS_JSON: ${{ secrets.SETTINGS_JSON }}
          
      - name: Download state from Gist
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: python sync_gist_state.py download
        
      - name: Run Main Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python main.py

      - name: Run Collect Homebrew Updates (if time matches or forced)
        env:
          FORCE_TASK: ${{ github.event.inputs.force_task }}
        run: |
          CURRENT_HOUR=$(date -u +%H)
          if [ "$FORCE_TASK" = "run_collect_homebrew" ]; then
            echo "Manually forced run_collect_homebrew..."
            python collect_homebrew_updates.py
          elif [ "$CURRENT_HOUR" = "05" ]; then
            echo "Time is 08:00 Kyiv time (05:00 UTC), running homebrew collector..."
            python collect_homebrew_updates.py
          else
            echo "Skipping homebrew collector (not scheduled and not forced)"
          fi
          
      - name: Run Collect Swuk Updates (if time matches or forced)
        env:
          FORCE_TASK: ${{ github.event.inputs.force_task }}
        run: |
          CURRENT_HOUR=$(date -u +%H)
          if [ "$FORCE_TASK" = "run_collect_swuk" ]; then
            echo "Manually forced run_collect_swuk..."
            python collect_swuk_updates.py
          elif [ "$CURRENT_HOUR" = "05" ]; then
            echo "Time is 08:00 Kyiv time (05:00 UTC), running swuk collector..."
            python collect_swuk_updates.py
          else
            echo "Skipping swuk collector (not scheduled and not forced)"
          fi

      - name: Run Send Daily Digest (if time matches or forced)
        env:
          FORCE_TASK: ${{ github.event.inputs.force_task }}
        run: |
          CURRENT_HOUR=$(date -u +%H)
          if [ "$FORCE_TASK" = "run_daily_digest" ]; then
            echo "Manually forced run_daily_digest..."
            python send_daily_digest.py
          elif [ "$CURRENT_HOUR" = "06" ]; then
            echo "Time is 09:00 Kyiv time (06:00 UTC), running daily digest..."
            python send_daily_digest.py
          else
            echo "Skipping daily digest (not scheduled and not forced)"
          fi

      - name: Run Send Homebrew Digest (if time matches or forced)
        env:
          FORCE_TASK: ${{ github.event.inputs.force_task }}
        run: |
          CURRENT_HOUR=$(date -u +%H)
          if [ "$FORCE_TASK" = "run_homebrew_digest" ]; then
            echo "Manually forced run_homebrew_digest..."
            python send_homebrew_digest.py
          elif [ "$CURRENT_HOUR" = "06" ]; then
            echo "Time is 09:00 Kyiv time (06:00 UTC), running homebrew digest..."
            python send_homebrew_digest.py
          else
            echo "Skipping homebrew digest (not scheduled and not forced)"
          fi
          
      - name: Run Send Swuk Digest (if time matches or forced)
        env:
          FORCE_TASK: ${{ github.event.inputs.force_task }}
        run: |
          CURRENT_HOUR=$(date -u +%H)
          if [ "$FORCE_TASK" = "run_swuk_digest" ]; then
            echo "Manually forced run_swuk_digest..."
            python send_swuk_digest.py
          elif [ "$CURRENT_HOUR" = "06" ]; then
            echo "Time is 09:00 Kyiv time (06:00 UTC), running swuk digest..."
            python send_swuk_digest.py
          else
            echo "Skipping swuk digest (not scheduled and not forced)"
          fi

      - name: Upload state to Gist
        if: always() # Ensure state is saved even if bot fails
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: python sync_gist_state.py upload
